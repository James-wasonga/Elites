<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Elites Stock &amp; Tech Solutions</title>
    <desc>Circular logo with a bold E monogram and connected network nodes</desc>
  
    <!-- Outer filled circle background -->
    <circle cx="340" cy="340" r="320" fill="#0d1117"/>
    <circle cx="340" cy="340" r="320" fill="none" stroke="#e8a020" stroke-width="8"/>
    <circle cx="340" cy="340" r="290" fill="none" stroke="rgba(232,160,32,0.18)" stroke-width="1"/>
  
    <!-- Background grid rings -->
    <circle cx="340" cy="340" r="240" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <circle cx="340" cy="340" r="180" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <circle cx="340" cy="340" r="120" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  
    <!-- Crosshairs -->
    <line x1="40" y1="340" x2="640" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="340" y1="40" x2="340" y2="640" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  
    <!-- Satellite nodes + dashed connectors -->
    <line x1="340" y1="160" x2="340" y2="205" stroke="rgba(232,160,32,0.45)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="340" cy="148" r="12" fill="#e8a020"/>
  
    <line x1="483" y1="218" x2="408" y2="265" stroke="rgba(192,98,42,0.45)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="493" cy="210" r="9" fill="#c0622a"/>
  
    <line x1="538" y1="366" x2="440" y2="340" stroke="rgba(99,102,241,0.45)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="548" cy="370" r="10" fill="#6366f1"/>
  
    <line x1="467" y1="490" x2="407" y2="428" stroke="rgba(16,185,129,0.45)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="476" cy="498" r="9" fill="#10b981"/>
  
    <line x1="210" y1="486" x2="278" y2="425" stroke="rgba(14,165,233,0.45)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="200" cy="494" r="9" fill="#0ea5e9"/>
  
    <line x1="154" y1="351" x2="240" y2="330" stroke="rgba(232,160,32,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="144" cy="355" r="10" fill="#e8a020" opacity="0.7"/>
  
    <line x1="206" y1="219" x2="272" y2="263" stroke="rgba(245,158,11,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="197" cy="210" r="9" fill="#f59e0b" opacity="0.6"/>
  
    <!-- Central hub glow ring -->
    <circle cx="340" cy="340" r="95" fill="rgba(232,160,32,0.08)" stroke="rgba(232,160,32,0.25)" stroke-width="1.5"/>
  
    <!-- Central amber badge -->
    <circle cx="340" cy="340" r="78" fill="#e8a020"/>
  
    <!-- Bold E letterform -->
    <rect x="308" y="295" width="16" height="90" rx="3" fill="#0d1117"/>
    <rect x="308" y="295" width="56" height="16" rx="3" fill="#0d1117"/>
    <rect x="308" y="332" width="44" height="14" rx="3" fill="#0d1117"/>
    <rect x="308" y="369" width="56" height="16" rx="3" fill="#0d1117"/>
  
    <!-- Brand name -->
    <text x="340" y="90" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#e8a020" letter-spacing="6">ELITES</text>
    <text x="340" y="608" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="3">STOCK &amp; TECH SOLUTIONS</text>
  
    <!-- Cardinal tick marks -->
    <g stroke="#e8a020" stroke-width="2" opacity="0.5">
      <line x1="340" y1="22" x2="340" y2="36"/>
      <line x1="340" y1="644" x2="340" y2="658"/>
      <line x1="22" y1="340" x2="36" y2="340"/>
      <line x1="644" y1="340" x2="658" y2="340"/>
    </g>
  
    <!-- Diamond accents -->
    <polygon points="340,25 346,34 340,43 334,34" fill="#e8a020"/>
    <polygon points="340,637 346,646 340,655 334,646" fill="#e8a020"/>
    <polygon points="25,340 34,334 43,340 34,346" fill="#e8a020"/>
    <polygon points="637,340 646,334 655,340 646,346" fill="#e8a020"/>
  </svg> 